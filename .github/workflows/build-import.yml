name: Build import.json

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "styles/**"
      - "lib/**"
      - "scripts/stylus-import/**"
      - "deno.json"
      - ".github/workflows/build-import.yml"

permissions:
  contents: write

jobs:
  build:
    if: github.repository == 'syndrizzle/userstyles-oled'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build import.json
        run: deno task build:import

      - name: Publish import.json to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view all-userstyles-export || gh release create all-userstyles-export --title "All Userstyles Export" --notes "Latest generated Stylus import file."
          gh release upload all-userstyles-export dist/import.json --clobber
